<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>AgentStatus</title>
    <script src="/main.js" defer></script>
  </head>
  <body>
    <div id="bar" data-tauri-drag-region>
      <!-- The frosted pill (fill + blur + border + shadow). Kept as a clipped layer
           behind the lights so the backdrop blur can't leak past the rounded corners
           (a WebKit bug that otherwise draws a faint rectangle on light backgrounds). -->
      <div id="pill"></div>
      <div id="lights" data-tauri-drag-region></div>
      <!-- Settings panel: hidden until right-click on the bar toggles it. -->
      <div id="settings" hidden>
        <div class="sep"></div>
        <div class="row">
          <span class="row-label">Mode</span>
          <div class="seg" id="mode-seg">
            <button type="button" data-mode="floating">Floating</button>
            <button type="button" data-mode="menubar">Menu bar</button>
          </div>
        </div>
        <div class="row" id="condense-row" hidden>
          <span class="row-label">Menu bar</span>
          <div class="seg" id="condense-seg">
            <button type="button" data-condense="false">Dots</button>
            <button type="button" data-condense="true">Single</button>
          </div>
        </div>
        <div class="row" id="orient-row">
          <span class="row-label">Orientation</span>
          <div class="seg" id="orient-seg">
            <button type="button" data-orient="horizontal">Horizontal</button>
            <button type="button" data-orient="vertical">Vertical</button>
          </div>
        </div>
        <div class="row">
          <span class="row-label">Sort</span>
          <div class="seg" id="sort-seg">
            <button type="button" data-sort="window">Window</button>
            <button type="button" data-sort="urgency">Urgency</button>
          </div>
        </div>
        <div class="row">
          <span class="row-label">Size</span>
          <input type="range" id="size-range" min="8" max="24" step="1" />
        </div>
        <div class="row">
          <span class="row-label">Padding</span>
          <input type="range" id="pad-range" min="2" max="20" step="1" />
        </div>
        <div class="row">
          <span class="row-label">Opacity</span>
          <input type="range" id="opacity-range" min="0" max="100" step="5" />
        </div>
        <div class="sep"></div>
        <div class="colors" id="colors">
          <div class="crow"><span class="row-label">Running</span><input type="color" data-state="running" /></div>
          <div class="crow"><span class="row-label">Blocked</span><input type="color" data-state="blocked" /></div>
          <div class="crow"><span class="row-label">Done</span><input type="color" data-state="done" /></div>
          <div class="crow"><span class="row-label">Idle</span><input type="color" data-state="idle" /></div>
          <div class="crow"><span class="row-label">Error</span><input type="color" data-state="error" /></div>
        </div>
        <div class="footer">
          <button type="button" id="reload-btn">Reload</button>
          <button type="button" id="reset-btn">Reset to defaults</button>
          <button type="button" id="quit-btn">Quit</button>
        </div>
      </div>
    </div>
  </body>
</html>
