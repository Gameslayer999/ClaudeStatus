<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <title>ClaudeStatus</title>
    <script src="/main.js" defer></script>
  </head>
  <body>
    <div id="bar" data-tauri-drag-region>
      <div id="lights" data-tauri-drag-region></div>
      <!-- Settings panel: hidden until right-click on the bar toggles it. -->
      <div id="settings" hidden>
        <div class="sep"></div>
        <div class="row">
          <span class="row-label">Orientation</span>
          <div class="seg" id="orient-seg">
            <button type="button" data-orient="horizontal">Horizontal</button>
            <button type="button" data-orient="vertical">Vertical</button>
          </div>
        </div>
        <div class="row">
          <span class="row-label">Size</span>
          <input type="range" id="size-range" min="8" max="24" step="1" />
        </div>
        <div class="row">
          <span class="row-label">Padding</span>
          <input type="range" id="pad-range" min="2" max="20" step="1" />
        </div>
        <div class="sep"></div>
        <div class="colors" id="colors">
          <div class="crow"><span class="row-label">Running</span><input type="color" data-state="running" /></div>
          <div class="crow"><span class="row-label">Blocked</span><input type="color" data-state="blocked" /></div>
          <div class="crow"><span class="row-label">Done</span><input type="color" data-state="done" /></div>
          <div class="crow"><span class="row-label">Idle</span><input type="color" data-state="idle" /></div>
          <div class="crow"><span class="row-label">Error</span><input type="color" data-state="error" /></div>
        </div>
        <div class="footer">
          <button type="button" id="reload-btn">Reload</button>
          <button type="button" id="reset-btn">Reset to defaults</button>
        </div>
      </div>
    </div>
  </body>
</html>
